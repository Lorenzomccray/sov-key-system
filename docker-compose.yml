services:
  key-authority:
    build: ./key_authority
    container_name: sov-key-auth
    ports:
      - "${KEY_AUTH_HOST_PORT:-8001}:8001"
    volumes:
      - sov-key-data:/data
    tmpfs:
      - /tmp
    environment:
      - PEPPER_FILE=/data/pepper.txt
      - DB_FILE=/data/keys.db
      - MASTER_ADMIN_KEY=${MASTER_ADMIN_KEY}
    dns:
      - 127.0.0.11
    mem_limit: 128m
    cpus: 0.5
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 10s
    init: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  gateway:
    build: ./gateway
    container_name: sov-gateway
    ports:
      - "${GATEWAY_HOST_PORT:-8000}:8000"
    volumes:
      - sov-gateway-data:/data
    tmpfs:
      - /tmp
    environment:
      - KEY_AUTHORITY_URL=http://key-authority:8001/validate
      - OLLAMA_URL=http://host.docker.internal:11434
      - ML_ADVERSARIAL_URL=http://ml-adversarial:8010
      - ML_EXTRACTION_URL=http://ml-extraction:8011
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 127.0.0.11
    mem_limit: 256m
    cpus: 1.0
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 10s
    init: true
    depends_on:
      key-authority:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ml-adversarial:
    build: ./ml-adversarial
    container_name: sov-ml-adversarial
    ports:
      - "${ML_ADVERSARIAL_HOST_PORT:-8010}:8010"
    tmpfs:
      - /tmp
    environment:
      - KEY_AUTHORITY_URL=http://key-authority:8001/validate
    dns:
      - 127.0.0.11
    mem_limit: 512m
    cpus: 0.5
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 10s
    init: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ml-extraction:
    build: ./ml-extraction
    container_name: sov-ml-extraction
    ports:
      - "${ML_EXTRACTION_HOST_PORT:-8011}:8011"
    volumes:
      - sov-ml-extraction-data:/data
    tmpfs:
      - /tmp
    environment:
      - KEY_AUTHORITY_URL=http://key-authority:8001/validate
      - HF_HOME=/data/huggingface
    dns:
      - 127.0.0.11
    mem_limit: 4g
    cpus: 2.0
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 30s
    init: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build: ./dashboard
    container_name: sov-dashboard
    ports:
      - "${DASHBOARD_HOST_PORT:-8501}:8501"
    tmpfs:
      - /tmp
    environment:
      - MASTER_ADMIN_KEY=${MASTER_ADMIN_KEY}
      - DASHBOARD_AI_KEY=${DASHBOARD_AI_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    dns:
      - 127.0.0.11
    mem_limit: 256m
    cpus: 0.5
    volumes:
      - sov-dashboard-streamlit:/root/.streamlit
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    stop_grace_period: 10s
    init: true
    depends_on:
      key-authority:
        condition: service_healthy
      gateway:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  sov-key-data:
  sov-gateway-data:
  sov-ml-extraction-data:
  sov-dashboard-streamlit: